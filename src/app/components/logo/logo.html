<span class="inline-flex items-center gap-2 select-none" [style.height.px]="size">
  <!-- Coin mark -->
  <svg
    [attr.height]="size"
    viewBox="0 0 150 158"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
    role="img"
    aria-label="Masroofi"
    class="shrink-0 overflow-visible"
  >
    <defs>
      <linearGradient [attr.id]="gid" x1="18" y1="30" x2="120" y2="140" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#FCE79A" />
        <stop offset="0.45" stop-color="#FBD963" />
        <stop offset="1" stop-color="#EBB52E" />
      </linearGradient>
      <linearGradient [attr.id]="gid + '-rim'" x1="20" y1="40" x2="110" y2="150" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#F2C53D" />
        <stop offset="1" stop-color="#D89B1E" />
      </linearGradient>
    </defs>

    <g transform="rotate(-18 72 84)">
      <!-- coin thickness / edge -->
      <ellipse cx="78" cy="90" rx="48" ry="56" [attr.fill]="'url(#' + gid + '-rim)'" />
      <!-- edge ridges -->
      <g stroke="#191919" stroke-width="3" stroke-linecap="round" opacity="0.85">
        <line x1="118" y1="66" x2="124" y2="72" />
        <line x1="122" y1="84" x2="128" y2="90" />
        <line x1="121" y1="102" x2="127" y2="108" />
        <line x1="115" y1="119" x2="121" y2="125" />
      </g>
      <!-- coin face -->
      <ellipse cx="70" cy="84" rx="48" ry="56" [attr.fill]="'url(#' + gid + ')'" stroke="#191919" stroke-width="4" />
      <ellipse cx="70" cy="84" rx="40" ry="47" fill="none" stroke="#191919" stroke-width="2.5" opacity="0.55" />
      <!-- M monogram -->
      <path
        d="M50 112 V58 h12 l8 26 8-26 h12 v54 h-11 V80 l-7 24 h-5 l-7-24 v32 z"
        fill="#191919"
      />
    </g>

    <!-- signature star -->
    <path
      [attr.d]="starPath"
      fill="#FBD963"
      stroke="#191919"
      stroke-width="3"
      stroke-linejoin="round"
      transform="translate(112 8) scale(0.9)"
    />
  </svg>

  @if (wordmark) {
    <span
      class="font-semibold lowercase tracking-tight leading-none"
      [style.color]="resolvedWordColor"
      [style.fontSize.px]="size * 0.52"
    >masroofi</span>
  }
</span>
