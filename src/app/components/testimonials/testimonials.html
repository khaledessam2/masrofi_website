<section class="bg-ink py-16 text-white lg:py-24">
  <div class="container-x">
    <div class="grid items-center gap-10 lg:grid-cols-[1fr_1.6fr]">
      <div reveal revealFrom="left">
        <h2 class="text-4xl font-black lg:text-5xl">{{ header.heading }}</h2>
        <p class="mt-4 text-white/75">
          {{ header.subtitle }}
        </p>
        <div class="mt-6 flex items-center gap-1">
          @for (s of [1, 2, 3, 4, 5]; track s) {
            <app-star [size]="22" color="var(--color-gold)" />
          }
          <span class="ml-2 text-sm font-semibold text-white/80">{{ header.ratingLabel }}</span>
        </div>
      </div>
      <div reveal>
        <!-- slider track -->
        <div
          #track
          class="flex snap-x snap-mandatory gap-4 overflow-x-auto scroll-smooth pb-1 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
        >
          @for (t of testimonials; track t.quote) {
            <figure
              class="w-[85%] shrink-0 snap-start rounded-2xl bg-white p-6 text-ink sm:w-[calc(50%-0.5rem)]"
            >
              <div class="flex gap-1">
                @for (s of [1, 2, 3, 4, 5]; track s) {
                  <app-star [size]="15" color="var(--color-green)" />
                }
              </div>
              <blockquote class="mt-3 text-sm font-medium leading-relaxed">
                “{{ t.quote }}”
              </blockquote>
            </figure>
          }
        </div>

        <!-- slider controls -->
        <div class="mt-6 flex justify-end gap-3">
          <button
            type="button"
            (click)="scrollTrack(track, -1)"
            aria-label="Previous testimonials"
            class="flex h-11 w-11 items-center justify-center rounded-full bg-white/10 text-white ring-1 ring-white/20 transition hover:bg-white/20"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button
            type="button"
            (click)="scrollTrack(track, 1)"
            aria-label="Next testimonials"
            class="flex h-11 w-11 items-center justify-center rounded-full bg-white/10 text-white ring-1 ring-white/20 transition hover:bg-white/20"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
