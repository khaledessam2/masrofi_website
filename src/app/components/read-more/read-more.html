<section class="bg-sky/20 py-16 lg:py-24">
  <div class="container-x">
    <div reveal class="mx-auto max-w-2xl text-center">
      <h2 class="text-4xl font-black lg:text-6xl">{{ heading }}</h2>
      <p class="mt-4 text-lg text-ink/70">{{ subtitle }}</p>
    </div>

    <div class="mt-12 grid gap-6 lg:grid-cols-3">
      @for (b of cards; track b.title; let i = $index) {
        <a reveal [revealDelay]="i * 120" routerLink="/" class="group flex flex-col overflow-hidden rounded-[2rem] bg-white shadow-sm transition-transform hover:-translate-y-1">
          <div class="aspect-[16/10] overflow-hidden" [style.background]="accentVar(b.accent)">
            @if (b.img) {
              <img [src]="b.img" [alt]="b.title" class="h-full w-full object-cover" />
            } @else {
              <div class="flex h-full items-center justify-center">
                <app-star [size]="72" color="var(--color-ink)" />
              </div>
            }
          </div>
          <div class="p-6">
            <span class="text-xs font-bold uppercase tracking-wide text-green">{{ b.tag }}</span>
            <h3 class="mt-2 text-xl font-black group-hover:text-green">{{ b.title }}</h3>
            <p class="mt-2 text-sm text-ink/50">{{ b.read }}</p>
          </div>
        </a>
      }
    </div>
  </div>
</section>
